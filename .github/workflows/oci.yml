name: OCI ARM Instance Creator

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Create .env
        run: cp .env.example .env

      - name: Set OCI_PRIVATE_KEY
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > /tmp/oci_private_key.pem
          chmod 600 /tmp/oci_private_key.pem

      - name: Update OCI_PRIVATE_KEY_FILENAME in .env
        run: sed -i 's|OCI_PRIVATE_KEY_FILENAME=|OCI_PRIVATE_KEY_FILENAME=/tmp/oci_private_key.pem|g' .env

      - name: Install dependencies
        run: composer install --no-dev

      - name: Run
        id: run
        run: |
          OUTPUT=$(php index.php 2>&1)
          echo "$OUTPUT"
          echo "result=$OUTPUT" >> $GITHUB_OUTPUT

      - name: Notify Telegram
        if: always()
        run: |
          RUN_NUMBER=${{ github.run_number }}
          RESULT="${{ steps.run.outputs.result }}"
          MESSAGE="🔄 Oracle спроба #${RUN_NUMBER}%0A${RESULT}"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${MESSAGE}"
